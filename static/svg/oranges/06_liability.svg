<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 170" width="1100" height="170">
<defs>
  <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
    <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
  </marker>
</defs>
<style>
  .node rect { stroke: #999; stroke-width: 1.5; rx: 6; ry: 6; }
  .node text { font-family: sans-serif; font-size: 13px; fill: #333; text-anchor: middle; dominant-baseline: central; }
  .node .balance { font-size: 10px; fill: #666; text-anchor: end; dominant-baseline: auto; }
  .edge path { fill: none; stroke: #666; stroke-width: 1.5; marker-end: url(#arrowhead); }
  .edge text { font-family: sans-serif; font-size: 11px; fill: #555; text-anchor: middle; }
  .legend text { font-family: sans-serif; font-size: 11px; fill: #333; dominant-baseline: central; }
  .legend rect { stroke: #999; stroke-width: 1; rx: 3; ry: 3; }
</style>

<g class="node" transform="translate(40,40)">
  <rect width="140" height="50" fill="#EEB"/>
  <text x="70" y="25">Input</text>
  <text class="balance" x="140" y="50" dx="-4" dy="-4">-25.00 GBP</text>
</g>
<g class="node" transform="translate(260,40)">
  <rect width="140" height="50" fill="#BCE"/>
  <text x="70" y="25">Sales</text>
  <text class="balance" x="140" y="50" dx="-4" dy="-4">-37.50 GBP</text>
</g>
<g class="node" transform="translate(480,40)">
  <rect width="140" height="50" fill="#DDD"/>
  <text x="70" y="25">Farmer</text>
  <text class="balance" x="140" y="50" dx="-4" dy="-4">-25.00 GBP</text>
</g>
<g class="node" transform="translate(700,40)">
  <rect width="140" height="50" fill="#CDA"/>
  <text x="70" y="25">Cash</text>
  <text class="balance" x="140" y="50" dx="-4" dy="-4">62.50 GBP</text>
</g>
<g class="node" transform="translate(920,40)">
  <rect width="140" height="50" fill="#FCC"/>
  <text x="70" y="25">Purchases</text>
  <text class="balance" x="140" y="50" dx="-4" dy="-4">25.00 GBP</text>
</g>

<g class="edge">
  <path d="M180.0,65.0 C440.0,65.0 440.0,65.0 700.0,65.0"/>
  <text x="440" y="79">25.00 GBP</text>
</g>
<g class="edge">
  <path d="M620.0,65.0 C770.0,65.0 770.0,65.0 920.0,65.0"/>
  <text x="770" y="79">25.00 GBP</text>
</g>
<g class="edge">
  <path d="M400.0,65.0 C550.0,65.0 550.0,65.0 700.0,65.0"/>
  <text x="550" y="79">37.50 GBP</text>
</g>
<g class="legend" transform="translate(20,170)" dy="-30">
  <rect x="0" y="-30" width="14" height="14" fill="#EEB"/>
  <text x="18" y="-23">Equity</text>
  <rect x="100" y="-30" width="14" height="14" fill="#BCE"/>
  <text x="118" y="-23">Income</text>
  <rect x="200" y="-30" width="14" height="14" fill="#DDD"/>
  <text x="218" y="-23">Liability</text>
  <rect x="300" y="-30" width="14" height="14" fill="#CDA"/>
  <text x="318" y="-23">Asset</text>
  <rect x="400" y="-30" width="14" height="14" fill="#FCC"/>
  <text x="418" y="-23">Expense</text>
</g>
</svg>
