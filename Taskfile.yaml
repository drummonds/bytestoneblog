# https://taskfile.dev

version: '3'

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list-all

  download_theme:
    aliases: [dt]
    desc: Download the theme from the source repository
    cmds:
      - rm -rf themes/simpleness
      - git clone https://github.com/RainerChiang/simpleness.git themes/simpleness

  svg:generate:
    desc: Generate SVGs from goluca files using pta2svg
    cmds:
      - for f in goluca/oranges/*.goluca; do name=$(basename "$f" .goluca); pta2svg -o "static/svg/oranges/${name}.svg" "$f"; done
    sources:
      - goluca/oranges/*.goluca
    generates:
      - static/svg/oranges/*.svg

  hugo:
    desc: Build the Hugo site
    deps: [svg:generate]
    cmds:
      - hugo --minify

  public:build:
    desc: Build the Hugo site into public/ for blog deployment
    deps: [svg:generate]
    cmds:
      - hugo --minify

  docs:build:
    desc: Build project documentation into docs/
    cmds:
      - task-plus md2html --file index.md --dst docs

  serve:
    desc: Run Hugo development server
    cmds:
      - hugo server -D

  check:
    desc: Run Go checks (fmt, vet, test)
    cmds:
      - go fmt ./...
      - go vet ./...

  book:md:
    desc: Generate combined AFP markdown (for debugging)
    cmds:
      - go run ./cmd/afp2book > afp-book.md
      - echo "Wrote afp-book.md"

  book:pdf:
    desc: Generate AFP book PDF via pandoc+typst
    cmds:
      - go run ./cmd/afp2book -pdf afp-book.pdf

