{{ define "main" }}
<article class="post">
  <header class="post-header">
    <h1 style="text-align: center;" >{{ .Title }}</h1>
    <div class="post-metadata">
    {{ with .Date }}
      <time datetime="{{ .Format "2006-01-02T15:04:05Z07:00" }}">{{ .Format "2006 January 02" }}</time> &nbsp;
    {{ end }}
    </div>
  </header>

  <div class="post-text">
    {{ .Content }}
  </div>
</article>
{{ end }}
